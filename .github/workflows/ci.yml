name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Report bundle size
        run: |
          echo "## dist bundle sizes" >> "$GITHUB_STEP_SUMMARY"
          ls -lh dist/index.js dist/index.cjs dist/styles.css 2>/dev/null | awk '{print "| " $9 " | " $5 " |"}' >> "$GITHUB_STEP_SUMMARY" || true
